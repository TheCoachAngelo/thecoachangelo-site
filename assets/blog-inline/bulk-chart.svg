<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#050505"/>
  <rect x="40" y="40" width="1120" height="595" rx="24" fill="#0c0c0e" stroke="#2a2a2e"/>
  <text x="70" y="95" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700">LEAN BULK SURPLUS VS OUTCOME</text>
  <text x="70" y="130" fill="#9da3af" font-family="Arial, Helvetica, sans-serif" font-size="18">Higher surplus does not create proportionally more muscle.</text>
  <line x1="110" y1="560" x2="1110" y2="560" stroke="#666" stroke-width="2"/>
  <line x1="110" y1="560" x2="110" y2="180" stroke="#666" stroke-width="2"/>
  <rect x="190" y="390" width="150" height="170" fill="#ffffff" opacity="0.85"/>
  <rect x="390" y="330" width="150" height="230" fill="#9ef54d" opacity="0.95"/>
  <rect x="590" y="220" width="150" height="340" fill="#e61e2a" opacity="0.9"/>
  <text x="205" y="585" fill="#ffffff" font-family="Arial" font-size="22">200 kcal</text>
  <text x="405" y="585" fill="#ffffff" font-family="Arial" font-size="22">350 kcal</text>
  <text x="602" y="585" fill="#ffffff" font-family="Arial" font-size="22">500+ kcal</text>
  <text x="200" y="360" fill="#ffffff" font-family="Arial" font-size="18">fat gain</text>
  <text x="200" y="382" fill="#9da3af" font-family="Arial" font-size="18">lower</text>
  <text x="405" y="300" fill="#ffffff" font-family="Arial" font-size="18">fat gain</text>
  <text x="405" y="322" fill="#9da3af" font-family="Arial" font-size="18">moderate</text>
  <text x="605" y="190" fill="#ffffff" font-family="Arial" font-size="18">fat gain</text>
  <text x="605" y="212" fill="#9da3af" font-family="Arial" font-size="18">highest</text>
  <text x="860" y="300" fill="#9ef54d" font-family="Arial" font-size="24">Muscle gain rises</text>
  <text x="860" y="336" fill="#9ef54d" font-family="Arial" font-size="24">but not in a straight line.</text>
  <text x="860" y="390" fill="#ffffff" font-family="Arial" font-size="20">Control the surplus.</text>
  <text x="860" y="418" fill="#ffffff" font-family="Arial" font-size="20">Control the result.</text>
</svg>