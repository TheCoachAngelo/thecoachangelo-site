<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#050505"/>
  <rect x="40" y="40" width="1120" height="595" rx="24" fill="#0c0c0e" stroke="#2a2a2e"/>
  <text x="70" y="95" fill="#ffffff" font-family="Arial" font-size="36" font-weight="700">SUPERDROL 2-WEEK WINDOW</text>
  <text x="70" y="130" fill="#9da3af" font-family="Arial" font-size="18">Short daily run. Then stop. That is the point.</text>
  <rect x="120" y="320" width="160" height="120" fill="#9ef54d"/><text x="145" y="390" fill="#000" font-family="Arial" font-size="22" font-weight="700">Week 1</text>
  <rect x="320" y="260" width="160" height="180" fill="#ffffff"/><text x="345" y="355" fill="#000" font-family="Arial" font-size="22" font-weight="700">Week 2</text>
  <rect x="520" y="180" width="160" height="260" fill="#e61e2a"/><text x="545" y="320" fill="#fff" font-family="Arial" font-size="22" font-weight="700">Stop</text>
  <text x="820" y="260" fill="#ffffff" font-family="Arial" font-size="20">Hardness up.</text>
  <text x="820" y="295" fill="#9ef54d" font-family="Arial" font-size="20">Liver stress up.</text>
  <text x="820" y="330" fill="#e61e2a" font-family="Arial" font-size="20">Do not extend it.</text>
</svg>