<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#050505"/>
  <rect x="40" y="40" width="1120" height="595" rx="24" fill="#0c0c0e" stroke="#2a2a2e"/>
  <text x="70" y="95" fill="#ffffff" font-family="Arial" font-size="36" font-weight="700">PROGRESSIVE OVERLOAD LADDER</text>
  <text x="70" y="130" fill="#9da3af" font-family="Arial" font-size="18">Load, reps, tempo, then volume. In that order.</text>
  <rect x="120" y="470" width="120" height="60" fill="#ffffff"/>
  <rect x="260" y="405" width="120" height="125" fill="#9ef54d"/>
  <rect x="400" y="340" width="120" height="190" fill="#ffffff"/>
  <rect x="540" y="270" width="120" height="260" fill="#e61e2a"/>
  <text x="118" y="565" fill="#ffffff" font-family="Arial" font-size="18">Week 1</text>
  <text x="258" y="565" fill="#ffffff" font-family="Arial" font-size="18">Week 2</text>
  <text x="398" y="565" fill="#ffffff" font-family="Arial" font-size="18">Week 3</text>
  <text x="538" y="565" fill="#ffffff" font-family="Arial" font-size="18">Week 4</text>
  <text x="810" y="270" fill="#ffffff" font-family="Arial" font-size="22">If one variable stalls,</text>
  <text x="810" y="305" fill="#9ef54d" font-family="Arial" font-size="22">move the next one up.</text>
  <text x="810" y="360" fill="#ffffff" font-family="Arial" font-size="20">That is progression.</text>
</svg>